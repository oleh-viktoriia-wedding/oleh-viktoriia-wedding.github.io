<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запрошення</title>
    <style>
        body { margin: 0; padding: 0; background-color: #FAF6EE; font-family: sans-serif; }
        .app-container { max-width: 480px; margin: 0 auto; overflow: hidden; }
        section { min-height: 100vh; padding: 50px 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .venue-img-container { width: 100%; height: 300px; margin: 20px 0; overflow: hidden; border-radius: 10px; }
        .venue-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .couple-illustration { width: 100%; height: 400px; background-size: contain; background-repeat: no-repeat; background-position: center; }
    </style>
</head>
<body>

<div class="app-container">
    <section id="hero">
        <h1>Олег та Вікторія</h1>
        <p>Запрошуємо на наше весілля!</p>
    </section>

    <section id="venue">
        <h2>Місце проведення</h2>
        <div class="venue-img-container">
            <img src="ForestPark.png" alt="Локація">
        </div>
    </section>

    <section id="footer">
        <div class="couple-illustration" style="background-image: url('ViktoriiaOlehScatch.png');"></div>
    </section>
</div>

</body>
</html>
